        <h1>Land-Use Effects on Convective Weather - Master's Thesis</h1>
        <p>My M.S. research examined how historical land-use change affected Midwest rainfall, surface fluxes, moisture transport, and mesoscale convective systems. The work combined numerical weather and land-surface modeling with geospatial data preparation and multi-source analysis.</p>

        <h2>Work Examples</h2>
        <ul>
          <li>Designed and ran WRF and Noah-MP experiments at multiple model resolutions.</li>
          <li>Prepared land-surface datasets by translating CESM/LUMIP land-use data to model grids.</li>
          <li>Compared ERA5, CESM, WRF, and observational datasets using Python, xarray, MATLAB, and NetCDF.</li>
        </ul>

        <h2>Technologies</h2>

          <li>WRF</li>
